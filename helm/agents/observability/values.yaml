# -- Optional reference to a ModelConfig resource for this agent. If not specified, the default model config will be used.
modelConfigRef: ""

# -- Optional runtime specification for the agent. If not specified, it will default to "python". Supported runtimes include "python" and "go".
runtime: ""

imagePullSecrets: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

compaction: {}

podSecurityContext: {}

securityContext: {}

# -- Optional Grafana datasource name for Prometheus (e.g. "Prometheus"). When set, the agent
# uses this datasource name for all Prometheus queries instead of discovering it at runtime.
grafana:
  prometheusDatasourceName: ""
